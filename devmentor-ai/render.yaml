services:
  - type: web
    name: devmentor-ai-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python web_runner.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: anthropic/claude-opus-4.1
