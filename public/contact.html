<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar"><div class="container nav-wrap">
    <a class="logo" href="/">RESTORAN</a>
    <div class="nav-links"><a href="/">Home</a><a href="/menu.html">Menu</a><a href="/about.html">About</a><a class="active" href="/contact.html">Contact</a></div>
  </div></nav>
  <section><div class="container">
    <h1 class="section-title">Contact Page</h1>
    <div class="grid-2">
      <div class="card">
        <h3>Location map</h3>
        <iframe title="map" src="https://maps.google.com/maps?q=tashkent&t=&z=11&ie=UTF8&iwloc=&output=embed" width="100%" height="250" style="border:0;"></iframe>
      </div>
      <div class="card">
        <p><strong>Phone:</strong> +998 90 123 45 67</p>
        <p><strong>Email:</strong> hello@restoran.uz</p>
        <p><strong>Social:</strong> Instagram, Telegram, Facebook</p>
      </div>
    </div>
  </div></section>
  <button class="chat-toggle" id="chatToggle">💬</button>
  <div class="chat-box" id="chatBox">
    <div class="chat-head">Ask anything <button id="chatClose" class="btn btn-dark">x</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input"><input id="chatInput" /><button id="chatSend" class="btn btn-primary">Send</button></div>
  </div>
  <script src="/js/common.js"></script>
